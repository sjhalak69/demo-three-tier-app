name: Build and run frontend and backend
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG: ${{ github.sha }}
  FRONTEND: frontend

jobs:
  build-and-push:
    name: build and push image 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 
        uses: actions/checkout@v4

      - name: Login to GHCR 
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u "${{ github.actor }}" --password-stdin 

      - name: Build Image and run
        run: |
          docker build ./frontend -t $REGISTRY/$IMAGE_NAME/$FRONTEND:$TAG   
          docker build ./backend -t $REGISTRY/$IMAGE_NAME/backend:$TAG 

          echo "Docker build completed successfully!"
          docker images

          docker push $REGISTRY/$IMAGE_NAME/$FRONTEND:$TAG 
          docker push $REGISTRY/$IMAGE_NAME/backend:$TAG 
  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure SSH 
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem 

      - name: Deploy on EC2 
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
          if [ -d "~/my-3-tier-app/.git" ]; then &&
            cd ~/my-3-tier-app &&
            git fetch --all &&
            git reset --hard origin/main
          else
            rm -rf ~/my-3-tier-app &&
            git clone https://github.com{{ github.repository }}.git ~/my-3-tier-app &&
            cd ~/my-3-tier-app
          fi  

          sudo docker rm -f app_frontend app_backend app_mysql || true &&
          sudo docker system prune -f &&

          sudo docker network create app-net || true &&

          sudo docker build -t my-angular-frontend ./frontend &&
          sudo docker build -t my-springboot-backend ./backend &&

          sudo docker run -d --name app_mysql --network app-net \
          -p 3306:3306 \
          -v mysql_data:/var/lib/mysql \
          -v \$(pwd)/database/init.sql:/docker-entrypoint-initdb.d/init.sql \
          -e MYSQL_ROOT_PASSWORD=rootpassword \
          -e MYSQL_DATABASE=my_app_db \
          mysql:8.0 &&

          sleep 15 &&

          sudo docker run -d --name app_backend --network app-net \
          -p 8080:8080 \
          -e SPRING_DATASOURCE_URL=jdbc:mysql://app_mysql:3306/my_app_db?allowPublicKeyRetrieval=true&useSSL=false \
          my-springboot-backend &&

          sudo docker run -d --name app_frontend --network app-net \
          -p 80:80 my-angular-frontend
          
          sudo docker ps -a &&
          echo "Deployment completed successfully!" &&
          sudo docker images"
   