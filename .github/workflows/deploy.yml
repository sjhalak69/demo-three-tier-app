name: Build and run frontend and backend
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG: ${{ github.sha }}
  FRONTEND: frontend

jobs:
  build-and-push:
    name: build and push image 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 
        uses: actions/checkout@v4

      - name: Login to GHCR 
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u "${{ github.actor }}" --password-stdin 

      - name: Build Image and run
        run: |
          docker build ./frontend -t $REGISTRY/$IMAGE_NAME/$FRONTEND:$TAG   
          docker build ./backend -t $REGISTRY/$IMAGE_NAME/backend:$TAG 

          echo "Docker build completed successfully!"
          docker images

          docker push $REGISTRY/$IMAGE_NAME/$FRONTEND:$TAG 
          docker push $REGISTRY/$IMAGE_NAME/backend:$TAG 
  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure SSH 
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem 

      - name: Deploy on EC2 
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "

          mkdir -p ~/my-3-tier-app && cd ~/my-3-tier-app &&
          git fetch --all &&
          git reset --hard origin/main &&

          sudo docker compose down --remove-orphans || true && 
          sudo docker system prune -af --volumes &&

          sudo docker compose pull &&
          
          sudo docker compose up -d --build &&
          sudo docker ps -a &&
          echo "Deployment completed successfully!" &&
          sudo docker images"
   