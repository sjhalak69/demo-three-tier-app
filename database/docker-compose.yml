version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: app_mysql
    restart: always
    environment: 
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: my_app_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: app_backend
    restart: always
    ports:  
      - "8080:8080"
    environment: 
      - SPRING_DATASOURCE_URL=jdbc:mysql://database:3306/my_app_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=apppassword
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: app_frontend
    restart: always
    ports:  
      - "80:80"
    depends_on:
      - backend
volumes:
  mysql_data:      
networks:
  app-network:
    driver: bridge
    
                  